services:
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: vagmiai_ai_service
    ports:
      - "8000:8000"
    volumes:
      - ./ai_service:/app
      - ./shared_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vagmiai_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./shared_data:/data
    env_file:
      - ./backend/.env
    depends_on:
      - ai_service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vagmiai_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped