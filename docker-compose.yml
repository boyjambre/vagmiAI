services:
  mongo:
    image: mongo:7
    container_name: vagmiai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: vagmiai_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: adminpassword
      ME_CONFIG_BASICAUTH: "true"
    depends_on:
      - mongo

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: vagmiai_ai_service
    ports:
      - "8000:8000"
    volumes:
      - ./ai_service:/app
      - ./shared_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vagmiai_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./shared_data:/data
    env_file:
      - ./.env
    environment:
      MONGODB_URI: mongodb://root:example@mongo:27017/vagmiai?authSource=admin
    depends_on:
      - mongo
      - ai_service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vagmiai_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data: